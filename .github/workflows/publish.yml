name: Publish to PyPI

# Triggered by pushing a version tag (e.g. v0.2.0).
#
# Uses PyPI Trusted Publishing (OIDC) -- no long-lived API token needed.
# Configure on PyPI side at https://pypi.org/manage/account/publishing/:
#   PyPI project: bulkurlchecker
#   Owner:        carlosofscience
#   Repo:         bulkurlchecker-python
#   Workflow:     publish.yml
#   Environment:  pypi
#
# The 'pypi' environment in this repo (Settings -> Environments) controls
# who can trigger publishes -- restrict to the main branch and require a
# manual reviewer for added safety.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/bulkurlchecker/
    permissions:
      contents: read
      id-token: write  # OIDC token for PyPI trusted publishing + sigstore attestations

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI (trusted publishing + attestations)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
